databases:
  - name: java-project-99-db
    plan: free

services:
  - type: web
    name: java-project-99
    runtime: docker
    plan: free
    healthCheckPath: /welcome
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: java-project-99-db
          property: connectionString
