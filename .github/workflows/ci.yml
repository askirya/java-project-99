name: Java CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Generate coverage report
        run: ./gradlew jacocoTestReport

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Disable SonarCloud Automatic Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::Secret SONAR_TOKEN is missing"
            exit 1
          fi
          # CI analysis conflicts with Automatic Analysis — disable autoscan for this project
          curl -sS -u "$SONAR_TOKEN:" -X POST "https://sonarcloud.io/api/settings/set" \
            -d "key=sonar.autoscan.enabled" \
            -d "value=false" \
            -d "component=askirya_java-project-99"

      - name: Build and analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --info -Dsonar.token="$SONAR_TOKEN" -Dsonar.qualitygate.wait=false
